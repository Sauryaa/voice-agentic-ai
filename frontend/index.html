<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mayo Clinic | Voice Interview Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>
    <main class="shell">
      <header class="header-card">
        <p class="eyebrow">Mayo Clinic</p>
        <h1>Agenda-Guided Voice Health Interview</h1>
        <p class="subcopy">
          Prototype workflow: answer each question by voice, and the agent only advances once your answer is complete.
        </p>
      </header>

      <section class="panel controls-panel">
        <div class="actions">
          <button id="startBtn" class="btn btn-primary">Start Interview</button>
          <button id="recordBtn" class="btn btn-accent" disabled>Start Recording</button>
        </div>
        <form id="textForm" class="text-form">
          <input id="textInput" type="text" placeholder="Fallback text answer..." autocomplete="off" disabled />
          <button type="submit" class="btn btn-neutral" disabled id="sendTextBtn">Send Text</button>
        </form>
        <div class="meta-row">
          <p id="statusText" class="status">Status: idle</p>
          <a id="logLink" href="#" target="_blank" rel="noreferrer" class="log-link hidden">Open JSON Log</a>
        </div>
      </section>

      <section class="panel chat-panel">
        <div id="chatList" class="chat-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
